# Nginx config for the frontend container.
# - /api/* proxies to the backend container (named "backend" in docker-compose)
# - All other routes serve the SPA (index.html for client-side routing)

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the backend container
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Pass through the auth header
        proxy_pass_header X-InsightPM-Auth;

        # Allow long-running requests (BigQuery can take a while)
        proxy_read_timeout 120s;
        proxy_connect_timeout 5s;
    }

    # SPA fallback: serve index.html for any unmatched route
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Don't cache index.html — we need users to get fresh JS bundles after deploy
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
